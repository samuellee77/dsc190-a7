stages:
  clean:
    cmd: uv run python src/clean.py
    deps:
      - src/clean.py
      - data/raw/events.csv
    outs:
      - data/clean/events.csv

  transform:
    cmd: uv run python src/transform.py
    deps:
      - src/transform.py
      - data/clean/events.csv
    outs:
      - data/transformed/events.csv

  features:
    cmd: uv run python src/features.py
    deps:
      - src/features.py
      - data/transformed/events.csv
    outs:
      - data/features/events.csv